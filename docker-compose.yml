services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rtm-class-mcp-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3030
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-}
      DB_NAME: ${DB_NAME:-rtm_db}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USER: ''
      REDIS_PASS: ''
      REDIS_DB: '0'
      REDIS_KEY_PREFIX: 'rtm:mcp:'
      REDIS_LOCK_TTL_MS: '15000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${DOCKER_APP_PORT:-3030}:3030'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3030/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: rtm-class-mcp-redis
    restart: unless-stopped
    ports:
      - '${DOCKER_REDIS_PORT:-6381}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
